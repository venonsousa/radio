<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Player PRO</title>

<!-- BOOTSTRAP -->
<link rel="stylesheet" href="bootstrap.min.css">

<!-- FONT -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@charset "utf-8";

/* IMPORTS */
@import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@1,300;1,800&display=swap');

/* ===== SEU CSS ORIGINAL COMPLETO ===== */

html, body {
    height: 100%;
}

body {
    display: flex;
    flex-flow: row;
    justify-content: center;
    overflow-x: hidden;
    background: #000;
}

#bgCover {
    height: 100%;
    width: 100%;
    position: fixed;
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center 20%;
    filter: blur(20px);
    transform: scale(2.2);
    z-index: 1;
}

.bg-mask {
    min-width: 100%;
    min-height: 100%;
    position: fixed;
    background-color: rgba(0,0,0,0.5);
    z-index: 2;
}

.web-player {
    height: 100%;
    color: #fff;
    padding: 10px;
    position: relative;
    z-index: 3;
    margin-top: 30px;
    max-width: 400px;
    width: 100%;
}

/* CAPA */
.cover-album {
    width: 100%;
    height: 320px;
    border-radius: 10px;
    background-size: cover;
    border: 2px solid #fff;
    box-shadow: 0px 5px 10px rgba(0,0,0,.5);
    margin-bottom: 15px;
}

/* TEXTO */
.info-current-song {
    text-align: center;
}

.info-current-song h2 {
    font-size: 28px;
    font-weight: 800;
    text-transform: uppercase;
}

.info-current-song h3 {
    font-size: 18px;
    font-weight: 600;
}

/* BOTÃO */
#playerButton {
    font-size: 70px;
    cursor: pointer;
}

/* VOLUME */
.volume-control {
    margin-top: 20px;
}

input[type=range] {
    width: 100%;
}

/* SLIDER */
input[type=range]::-webkit-slider-thumb {
    height: 20px;
    width: 20px;
    border-radius: 50%;
    background: #fff;
}

/* ===== FIM DO SEU CSS ===== */
</style>

</head>

<body>

<!-- FUNDO -->
<div id="bgCover"></div>
<div class="bg-mask"></div>

<!-- PLAYER -->
<div class="web-player text-center">

    <!-- CAPA -->
    <div id="currentCoverArt" class="cover-album"></div>

    <!-- INFO -->
    <div class="info-current-song">
        <h2 id="currentSong">Carregando...</h2>
        <h3 id="currentArtist">...</h3>
    </div>

    <!-- PLAY -->
    <div class="play-pause mt-3">
        <i id="playerButton" class="fa fa-play-circle"></i>
    </div>

    <!-- VOLUME -->
    <div class="volume-control">
        <input type="range" id="volume" min="0" max="100" value="80">
        <p>Volume: <span id="volIndicator">80</span>%</p>
    </div>

</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery.marquee@1.6.0/jquery.marquee.min.js"></script>

<script>
// CONFIG
const streamURL = "https://stm.igng.com.br:7018";
const apiURL = "http://igng.com.br/api/VG5wQmVFOUJQVDA9KzM=";

let audio = new Audio(streamURL);
audio.volume = 0.8;

// PLAY / PAUSE
const btn = document.getElementById("playerButton");

btn.addEventListener("click", () => {
    if (audio.paused) {
        audio.play();
        btn.classList.replace("fa-play-circle","fa-pause-circle");
    } else {
        audio.pause();
        btn.classList.replace("fa-pause-circle","fa-play-circle");
    }
});

// VOLUME
const volume = document.getElementById("volume");
const volIndicator = document.getElementById("volIndicator");

volume.addEventListener("input", () => {
    audio.volume = volume.value / 100;
    volIndicator.innerText = volume.value;
});

// API
function getData() {
    fetch(apiURL)
    .then(res => res.json())
    .then(data => {

        let song = data.currentSong || "Sem música";
        let artist = data.currentArtist || "Sem artista";

        // separa artista - música
        if (song.includes("-")) {
            let parts = song.split("-");
            artist = parts[0].trim();
            song = parts[1].trim();
        }

        $("#currentSong").text(song).marquee({duration:8000});
        $("#currentArtist").text(artist).marquee({duration:10000});

        buscarCapa(artist, song);
    });
}

// CAPA APPLE
function buscarCapa(artist, song) {
    let query = encodeURIComponent(artist + " " + song);

    fetch(`https://itunes.apple.com/search?term=${query}&limit=1`)
    .then(res => res.json())
    .then(data => {

        let cover = "https://via.placeholder.com/500x500";

        if (data.results.length > 0) {
            cover = data.results[0].artworkUrl100.replace("100x100","500x500");
        }

        document.getElementById("currentCoverArt").style.backgroundImage = `url(${cover})`;
        document.getElementById("bgCover").style.backgroundImage = `url(${cover})`;
    });
}

// LOOP
setInterval(getData, 10000);
getData();

</script>

</body>
</html>
