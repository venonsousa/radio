<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Rádio PRO</title>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
}

/* PLAYER */
.player {
  width: 767px;
  height: 410px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,0,0,0.4);
  overflow: hidden;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
}

/* CAPA */
.capa {
  width: 198px;
  height: 216px;
  background-size: cover;
  background-position: center;
  margin: 20px;
  border-radius: 12px;
}

/* CONTEÚDO */
.content {
  flex: 1;
  padding: 20px;
}

.radio {
  font-size: 18px;
  opacity: 0.8;
}

.musica {
  font-size: 22px;
  font-weight: bold;
  margin: 15px 0;
  white-space: nowrap;
  overflow: hidden;
}

.rolar {
  display: inline-block;
  padding-left: 100%;
  animation: scroll 10s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

.ouvintes {
  margin-top: 10px;
  font-size: 14px;
}

/* BOTÃO ULTRA */
.controls {
  margin-top: 25px;
}

.play-btn {
  width: 75px;
  height: 75px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.4s ease;
}

.play-btn:hover {
  transform: scale(1.08);
  background: rgba(255,255,255,0.15);
}

.icon {
  width: 0;
  height: 0;
  border-left: 18px solid #fff;
  border-top: 12px solid transparent;
  border-bottom: 12px solid transparent;
  transition: all 0.3s ease;
}

.playing .icon {
  width: 16px;
  height: 20px;
  border: none;
  position: relative;
}

.playing .icon::before,
.playing .icon::after {
  content: "";
  position: absolute;
  top: 0;
  width: 5px;
  height: 100%;
  background: #fff;
  border-radius: 2px;
}

.playing .icon::before { left: 0; }
.playing .icon::after { right: 0; }

</style>
</head>

<body>

<div class="player">

  <div class="capa" id="capa"></div>

  <div class="content">
    <div class="radio" id="radio">Carregando...</div>

    <div class="musica">
      <span id="musica" class="rolar">Carregando música...</span>
    </div>

    <div class="ouvintes" id="ouvintes">
      👥 0 ouvintes
    </div>

    <!-- BOTÃO NOVO -->
    <div class="controls">
      <div class="play-btn" onclick="togglePlay()" id="btn">
        <div class="icon"></div>
      </div>
    </div>

  </div>

</div>

<audio id="audio" src="http://stm.igng.com.br:7018/stream"></audio>

<script>

let audio = document.getElementById("audio");
let btn = document.getElementById("btn");
let playing = false;

function togglePlay() {
  if (playing) {
    audio.pause();
    btn.classList.remove("playing");
    playing = false;
  } else {
    audio.play();
    btn.classList.add("playing");
    playing = true;
  }
}

// API JSON (jQuery)
function carregarDados() {

  $.getJSON(
    "https://api.allorigins.win/raw?url=http://igng.com.br/api-json/VG5wQmVFOUJQVDA9KzM=",
    function(data) {

      $("#radio").text(data.titulo);
      $("#musica").text(data.musica_atual);
      $("#ouvintes").text("👥 " + data.ouvintes_conectados + " ouvintes");

      if (data.capa_musica) {
        $("#capa").css("background-image", "url(" + data.capa_musica + ")");
      }

    }
  );
}

// AUTO UPDATE
setInterval(carregarDados, 10000);
carregarDados();

</script>

</body>
</html>
