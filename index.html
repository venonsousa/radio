<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Player da Rádio</title>
  <style>
    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }

    .radio-player {
      width: 770px;
      height: 433px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 10;
    }

    .header h2 {
      font-size: 1.6em;
      margin-bottom: 8px;
    }

    .content {
      display: flex;
      align-items: center;
    }

    .album-cover {
      width: 200px;
      height: 200px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .track-info {
      margin-left: 20px;
      font-size: 1.1em;
    }

    .track-info p {
      margin: 6px 0;
    }

    .player-audio {
      margin-top: 20px;
    }

    audio {
      width: 100%;
    }

    /* Notas musicais menores e sobre o player */
    .note {
      position: absolute;
      font-size: 14px;
      color: #ffcc00;
      pointer-events: none;
      animation: floatUp 1.2s ease-out forwards;
      z-index: 9999;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-30px); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="radio-player">
    <div class="header">
      <h2 id="radio-name"></h2>
      <p>Ouvintes: <span id="listeners"></span></p>
      <p>Bitrate: <span id="bitrate"></span></p>
    </div>

    <div class="content">
      <img id="album-cover" alt="Capa do Álbum" class="album-cover">
      <div class="track-info">
        <p><strong>Música atual:</strong> <span id="song"></span></p>
        <p><strong>Gênero:</strong> <span id="genre"></span></p>
      </div>
    </div>

    <div class="player-audio">
      <audio id="radio-stream" controls autoplay>
        <source src="https://stm.igng.com.br:7018/stream" type="audio/mpeg">
        Seu navegador não suporta áudio HTML5.
      </audio>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    // 1. Puxar dados da API da rádio
    $.getJSON('http://igng.com.br/api-json/VG5wQmVFOUJQVDA9KzM=', function(data) {
      console.log(data); // debug para ver os campos

      $("#radio-name").text(data.titulo);
      $("#listeners").text(data.ouvintes_conectados);
      $("#bitrate").text(data.plano_bitrate + " kbps");
      $("#song").text(data.musica_atual);
      $("#genre").text(data.genero);

      // 2. Mostrar capa da API ou buscar na Apple Music
      if (data.capa_musica) {
        $("#album-cover").attr("src", data.capa_musica);
      } else {
        const developerToken = "SEU_APPLE_DEVELOPER_TOKEN"; // substitua pelo seu token
        const musica = data.musica_atual;

        fetch(`https://api.music.apple.com/v1/catalog/br/search?term=${encodeURIComponent(musica)}&types=songs`, {
          headers: { Authorization: `Bearer ${developerToken}` }
        })
        .then(res => res.json())
        .then(result => {
          if (result.results.songs.data.length > 0) {
            const song = result.results.songs.data[0];
            const albumCover = song.attributes.artwork.url
              .replace('{w}', '300')
              .replace('{h}', '300');
            $("#album-cover").attr("src", albumCover);
          }
        });
      }
    });

    // 3. Efeito de notas musicais no cursor
    document.addEventListener("mousemove", function(e) {
      const note = document.createElement("div");
      note.className = "note";
      note.style.left = e.pageX + "px";
      note.style.top = e.pageY + "px";
      note.textContent = "♪";
      document.body.appendChild(note);

      setTimeout(() => { note.remove(); }, 1200);
    });
  </script>
</body>
</html>
