<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Rádio ULTRA MASTER</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial;
  background: #000;
  overflow: hidden;
}

/* FUNDO */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  filter: blur(40px) brightness(0.4);
  transform: scale(1.2);
  background-size: cover;
  z-index: -1;
  transition: 0.8s;
}

/* PLAYER */
.player {
  width: 767px;
  height: 410px;
  display: flex;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
}

/* CAPA */
.capa {
  width: 198px;
  height: 216px;
  margin: 20px;
  border-radius: 12px;
  background: #222;
  background-size: cover;
  background-position: center;
}

/* CONTEÚDO */
.content {
  padding: 20px;
  flex: 1;
}

.radio { opacity: 0.8; }

/* RELÓGIO */
.relogio {
  margin-top: 5px;
  font-size: 14px;
  opacity: 0.8;
}

/* AO VIVO */
.live {
  display: inline-block;
  margin-top: 10px;
  padding: 5px 10px;
  background: red;
  border-radius: 20px;
  font-size: 12px;
  font-weight: bold;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.5; }
}

/* ARTISTA */
.artista {
  margin-top: 10px;
  font-size: 18px;
}

/* 🎵 MUSICA CORRIGIDA (NUNCA SAI DO PLAYER) */
.musica {
  width: 100%;
  overflow: hidden;
  position: relative;
  font-size: 24px;
  font-weight: bold;
}

.musica span {
  display: inline-block;
  white-space: nowrap;
  padding-right: 50px;
}

/* fade nas bordas */
.musica::before,
.musica::after {
  content: "";
  position: absolute;
  top: 0;
  width: 40px;
  height: 100%;
  z-index: 2;
}

.musica::before {
  left: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.9), transparent);
}

.musica::after {
  right: 0;
  background: linear-gradient(to left, rgba(0,0,0,0.9), transparent);
}

/* animação */
.rolando {
  animation: rolarTexto linear infinite alternate;
}

@keyframes rolarTexto {
  from { transform: translateX(0); }
  to   { transform: translateX(calc(-100% + 100%)); }
}

/* OUVINTES */
.ouvintes {
  margin-top: 10px;
}

/* BOTÃO */
.play-btn {
  width: 60px;
  height: 60px;
  margin-top: 20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.icon {
  width: 0;
  height: 0;
  border-left: 14px solid #fff;
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
}

.playing .icon {
  width: 14px;
  height: 18px;
  border: none;
  position: relative;
}

.playing .icon::before,
.playing .icon::after {
  content: "";
  position: absolute;
  width: 4px;
  height: 100%;
  background: #fff;
}

.playing .icon::before { left: 0; }
.playing .icon::after { right: 0; }

/* 🔵 BOLINHAS BRANCAS */
.particle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  background: rgba(255,255,255,0.9);
  box-shadow: 0 0 8px rgba(255,255,255,0.6);
  animation: subir 1s ease-out forwards;
}

@keyframes subir {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-50px) scale(0.3); opacity: 0; }
}

</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="player">

  <div class="capa" id="capa"></div>

  <div class="content">
    <div class="radio" id="radio">Carregando...</div>

    <div class="relogio">
      <span id="hora"></span> • 
      <span id="data"></span>
    </div>

    <div id="liveStatus"></div>

    <div class="artista" id="artista">---</div>

    <div class="musica">
      <span id="musicaTexto">---</span>
    </div>

    <div class="ouvintes" id="ouvintes">👥 0</div>

    <div class="play-btn" onclick="togglePlay()" id="btn">
      <div class="icon"></div>
    </div>
  </div>

</div>

<audio id="audio" src="https://stm.igng.com.br:7018/stream"></audio>

<script>

let audio = document.getElementById("audio");
let btn = document.getElementById("btn");
let ultimaMusica = "";
let ultimoTempo = 0;

// botão
audio.onplay = () => btn.classList.add("playing");
audio.onpause = () => btn.classList.remove("playing");

function togglePlay() {
  audio.paused ? audio.play() : audio.pause();
}

// relógio
function atualizarRelogio() {
  const agora = new Date();
  document.getElementById("hora").innerText =
    agora.toLocaleTimeString('pt-BR', { timeZone: 'America/Sao_Paulo' });
  document.getElementById("data").innerText =
    agora.toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' });
}
setInterval(atualizarRelogio, 1000);
atualizarRelogio();

// separar música
function separarMusica(texto) {
  if (!texto) return { artista: "Desconhecido", musica: "Sem dados" };

  let partes = texto.split(" - ");
  return partes.length >= 2
    ? { artista: partes[0], musica: partes.slice(1).join(" - ") }
    : { artista: "AO VIVO", musica: texto };
}

// música dinâmica perfeita
function atualizarTextoMusica(texto) {
  const el = document.getElementById("musicaTexto");
  el.classList.remove("rolando");
  el.style.animation = "";
  el.innerText = texto;

  setTimeout(() => {
    const container = el.parentElement;

    if (el.scrollWidth > container.clientWidth) {
      const distancia = el.scrollWidth - container.clientWidth;
      el.style.animation = `rolarTexto ${distancia / 30}s linear infinite alternate`;
      el.classList.add("rolando");
    }
  }, 200);
}

// APIs
const API_JSON = "https://api.codetabs.com/v1/proxy?quest=https://igng.com.br/api-json/VG5wQmVFOUJQVDA9KzM=";
const API_XML  = "https://api.codetabs.com/v1/proxy?quest=https://igng.com.br/api/NzAxOCsx";

// JSON
function carregarJSON() {
  fetch(API_JSON)
    .then(r => r.json())
    .then(data => {
      if (!data || !data.musica_atual) throw "erro";
      processar(data);
    })
    .catch(() => carregarXML());
}

// XML fallback
function carregarXML() {
  fetch(API_XML)
    .then(r => r.text())
    .then(str => {
      let xml = new DOMParser().parseFromString(str, "text/xml");

      let data = {
        titulo: xml.getElementsByTagName("titulo")[0]?.textContent,
        musica_atual: xml.getElementsByTagName("musica_atual")[0]?.textContent,
        ouvintes_conectados: xml.getElementsByTagName("ouvintes_conectados")[0]?.textContent,
        capa_musica: xml.getElementsByTagName("capa_musica")[0]?.textContent
      };

      processar(data);
    });
}

// atualizar player
function processar(data) {
  if (!data.musica_atual || data.musica_atual === ultimaMusica) return;

  ultimaMusica = data.musica_atual;

  let info = separarMusica(data.musica_atual);

  document.getElementById("radio").innerText = data.titulo || "Rádio";
  document.getElementById("artista").innerText = info.artista;
  atualizarTextoMusica(info.musica);
  document.getElementById("ouvintes").innerText = "👥 " + (data.ouvintes_conectados || 0);

  let live = document.getElementById("liveStatus");
  live.innerHTML = data.musica_atual.includes(" - ") ? "" : '<div class="live">● AO VIVO</div>';

  if (data.capa_musica && data.capa_musica.includes("http")) {
    document.getElementById("capa").style.backgroundImage = `url(${data.capa_musica})`;
    document.getElementById("bg").style.backgroundImage = `url(${data.capa_musica})`;
  }
}

// tempo real
setInterval(carregarJSON, 3000);
carregarJSON();

// partículas no mouse
document.addEventListener("mousemove", function(e) {
  const agora = Date.now();
  if (agora - ultimoTempo < 40) return;
  ultimoTempo = agora;

  const bolinha = document.createElement("div");
  bolinha.className = "particle";

  bolinha.style.left = e.clientX + "px";
  bolinha.style.top = e.clientY + "px";

  let size = Math.random() * 4 + 4;
  bolinha.style.width = size + "px";
  bolinha.style.height = size + "px";

  document.body.appendChild(bolinha);

  setTimeout(() => bolinha.remove(), 1000);
});

</script>

</body>
</html>
