<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Rádio ULTRA</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
  background: #000;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #111;
  background-size: cover;
  background-position: center;
  filter: blur(40px) brightness(0.4);
  transform: scale(1.2);
  z-index: -1;
  transition: 0.8s;
}

.player {
  width: 767px;
  height: 410px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  display: flex;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
}

.capa {
  width: 198px;
  height: 216px;
  margin: 20px;
  border-radius: 12px;
  background: #222;
  background-size: cover;
  background-position: center;
}

.content {
  flex: 1;
  padding: 20px;
}

.radio { opacity: 0.8; }
.artista { font-size: 18px; margin-top: 10px; }
.musica { font-size: 24px; font-weight: bold; }
.ouvintes { margin-top: 10px; }

/* BOTÃO */
.play-btn {
  width: 60px;
  height: 60px;
  margin-top: 20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.icon {
  width: 0;
  height: 0;
  border-left: 14px solid #fff;
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
  transition: 0.3s;
}

.playing .icon {
  width: 14px;
  height: 18px;
  border: none;
  position: relative;
}

.playing .icon::before,
.playing .icon::after {
  content: "";
  position: absolute;
  width: 4px;
  height: 100%;
  background: #fff;
}

.playing .icon::before { left: 0; }
.playing .icon::after { right: 0; }

</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="player">

  <div class="capa" id="capa"></div>

  <div class="content">
    <div class="radio" id="radio">Carregando...</div>
    <div class="artista" id="artista">---</div>
    <div class="musica" id="musica">---</div>
    <div class="ouvintes" id="ouvintes">👥 0</div>

    <div class="play-btn" onclick="togglePlay()" id="btn">
      <div class="icon"></div>
    </div>
  </div>

</div>

<audio id="audio" src="https://stm.igng.com.br:7018/stream"></audio>

<script>

let audio = document.getElementById("audio");
let btn = document.getElementById("btn");

audio.onplay = () => btn.classList.add("playing");
audio.onpause = () => btn.classList.remove("playing");

function togglePlay() {
  audio.paused ? audio.play() : audio.pause();
}

// separar artista
function separarMusica(texto) {
  if (!texto) return { artista: "Desconhecido", musica: "Sem dados" };
  let p = texto.split(" - ");
  return p.length >= 2 
    ? { artista: p[0], musica: p.slice(1).join(" - ") }
    : { artista: "Ao vivo", musica: texto };
}

// 👉 JSON principal
function carregarJSON() {
  $.getJSON(
    "https://api.allorigins.win/raw?url=https://igng.com.br/api-json/VG5wQmVFOUJQVDA9KzM=",
    function(data) {
      atualizarPlayer(data);
    }
  ).fail(function() {
    console.log("JSON falhou → usando XML");
    carregarXML();
  });
}

// 👉 XML fallback
function carregarXML() {
  fetch("https://api.allorigins.win/raw?url=https://igng.com.br/api/NzAxOCsx")
    .then(r => r.text())
    .then(str => {
      let xml = new DOMParser().parseFromString(str, "text/xml");

      let data = {
        titulo: xml.querySelector("titulo")?.textContent,
        musica_atual: xml.querySelector("musica_atual")?.textContent,
        ouvintes_conectados: xml.querySelector("ouvintes_conectados")?.textContent,
        capa_musica: xml.querySelector("capa_musica")?.textContent
      };

      atualizarPlayer(data);
    })
    .catch(() => console.log("XML também falhou"));
}

// atualizar UI
function atualizarPlayer(data) {
  if (!data) return;

  let info = separarMusica(data.musica_atual);

  $("#radio").text(data.titulo || "Rádio");
  $("#artista").text(info.artista);
  $("#musica").text(info.musica);
  $("#ouvintes").text("👥 " + (data.ouvintes_conectados || 0));

  if (data.capa_musica) {
    $("#capa").css("background-image", "url(" + data.capa_musica + ")");
    $("#bg").css("background-image", "url(" + data.capa_musica + ")");
  }
}

// loop
setInterval(carregarJSON, 10000);
carregarJSON();

</script>

</body>
</html>
