<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Rádio Glass</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
}

.player {
  width: 767px;
  height: 410px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,0,0,0.4);
  overflow: hidden;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
}

.capa {
  width: 198px;
  height: 216px;
  background-size: cover;
  background-position: center;
  margin: 20px;
  border-radius: 10px;
}

.content {
  flex: 1;
  padding: 20px;
}

.radio {
  font-size: 18px;
  opacity: 0.8;
}

.musica {
  font-size: 22px;
  font-weight: bold;
  margin: 15px 0;
  white-space: nowrap;
  overflow: hidden;
  position: relative;
}

.musica span {
  display: inline-block;
  padding-left: 100%;
  animation: scroll 10s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

.ouvintes {
  margin-top: 10px;
  font-size: 14px;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.2);
  color: #fff;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: rgba(255,255,255,0.3);
}
</style>
</head>

<body>

<div class="player">

  <div class="capa" id="capa"></div>

  <div class="content">
    <div class="radio" id="radio">Carregando...</div>

    <div class="musica">
      <span id="musica">Carregando música...</span>
    </div>

    <div class="ouvintes" id="ouvintes">
      👥 0 ouvintes
    </div>

    <button onclick="togglePlay()" id="btn">▶️ Play</button>
  </div>

</div>

<!-- STREAM ATUALIZADO -->
<audio id="audio" src="http://stm.igng.com.br:7018/stream" preload="none"></audio>

<script>

let audio = document.getElementById("audio");
let btn = document.getElementById("btn");
let playing = false;

function togglePlay() {
  if (playing) {
    audio.pause();
    btn.innerText = "▶️ Play";
    playing = false;
  } else {
    audio.play();
    btn.innerText = "⏸️ Pause";
    playing = true;
  }
}

// API
async function carregarDados() {
  try {
    const res = await fetch("https://api.allorigins.win/raw?url=http://igng.com.br/api/VG5wQmVFOUJQVDA9KzM=");
    const text = await res.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    const get = tag => xml.getElementsByTagName(tag)[0]?.textContent || "";

    document.getElementById("radio").innerText = get("titulo");
    document.getElementById("musica").innerText = get("musica_atual");
    document.getElementById("ouvintes").innerText = "👥 " + get("ouvintes_conectados") + " ouvintes";

    let capa = get("capa_musica");

    if (capa) {
      document.getElementById("capa").style.backgroundImage = `url(${capa})`;
    }

  } catch (e) {
    console.log("Erro API", e);
  }
}

setInterval(carregarDados, 10000);
carregarDados();

</script>

</body>
</html>
