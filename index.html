<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Player PRO</title>

<link rel="stylesheet" href="bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    background:#000;
    color:#fff;
    font-family: Arial;
    text-align:center;
}

#bgCover {
    position: fixed;
    width:100%;
    height:100%;
    background-size:cover;
    filter:blur(25px);
    opacity:.4;
    z-index:-1;
}

.player {
    max-width:400px;
    margin:50px auto;
}

.cover {
    width:100%;
    height:300px;
    background-size:cover;
    border-radius:15px;
}

#playerButton {
    font-size:70px;
    cursor:pointer;
}

.info {
    margin-top:10px;
    font-size:14px;
    opacity:0.8;
}

input[type=range] {
    width:100%;
}
</style>

</head>

<body>

<div id="bgCover"></div>

<div class="player">

    <div id="currentCoverArt" class="cover"></div>

    <h2 id="currentSong">Carregando...</h2>
    <h4 id="currentArtist">...</h4>

    <div class="info">
        👥 Ouvintes: <span id="listeners">0</span><br>
        📡 Status: <span id="status">Offline</span>
    </div>

    <i id="playerButton" class="fa fa-play-circle"></i>

    <br><br>

    <input type="range" id="volume" min="0" max="100" value="80">
    <p>Volume: <span id="volIndicator">80</span>%</p>

</div>

<script>
// CONFIG
const streamURL = "https://stm.igng.com.br:7018";
const apiURL = "http://igng.com.br/api/TnpBeE9BPT0rWg==";

let audio = new Audio(streamURL);
audio.volume = 0.8;

// PLAY
playerButton.onclick = () => {
    if(audio.paused){
        audio.play();
        playerButton.classList.replace("fa-play-circle","fa-pause-circle");
    } else {
        audio.pause();
        playerButton.classList.replace("fa-pause-circle","fa-play-circle");
    }
};

// VOLUME
volume.oninput = () => {
    audio.volume = volume.value/100;
    volIndicator.innerText = volume.value;
};

// 🔥 LER XML DIRETO NO JS
function getData(){
    fetch(apiURL)
    .then(res => res.text())
    .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
    .then(xml => {

        let musica = xml.getElementsByTagName("musica_atual")[0]?.textContent || "Sem música";
        let capaAPI = xml.getElementsByTagName("capa_musica")[0]?.textContent;
        let ouvintes = xml.getElementsByTagName("ouvintes_conectados")[0]?.textContent || "0";
        let statusRadio = xml.getElementsByTagName("status")[0]?.textContent || "Offline";

        let artist = "Desconhecido";
        let song = musica;

        // separa artista - música
        if(musica.includes("-")){
            let p = musica.split("-");
            artist = p[0].trim();
            song = p[1].trim();
        }

        currentSong.innerText = song;
        currentArtist.innerText = artist;

        listeners.innerText = ouvintes;
        status.innerText = statusRadio;

        buscarCapa(artist, song, capaAPI);
    })
    .catch(() => {
        currentSong.innerText = "Erro API";
    });
}

// CAPA (Apple + fallback API)
function buscarCapa(artist, song, capaAPI){
    let q = encodeURIComponent(artist+" "+song);

    fetch(`https://itunes.apple.com/search?term=${q}&limit=1`)
    .then(r=>r.json())
    .then(data=>{

        let cover = capaAPI || "https://via.placeholder.com/500x500?text=Radio";

        if(data.results.length){
            cover = data.results[0].artworkUrl100.replace("100x100","500x500");
        }

        currentCoverArt.style.backgroundImage = `url(${cover})`;
        bgCover.style.backgroundImage = `url(${cover})`;
    });
}

// LOOP
setInterval(getData, 8000);
getData();
</script>

</body>
</html>
