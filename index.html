<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Rádio ULTRA</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  filter: blur(40px) brightness(0.5);
  transform: scale(1.2);
  z-index: -1;
  transition: 0.8s;
}

.player {
  width: 767px;
  height: 410px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  display: flex;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
}

.capa {
  width: 198px;
  height: 216px;
  margin: 20px;
  border-radius: 12px;
  background-size: cover;
  background-position: center;
}

.content {
  flex: 1;
  padding: 20px;
}

.radio { opacity: 0.8; }

.artista {
  font-size: 18px;
  margin-top: 10px;
}

.musica {
  font-size: 24px;
  font-weight: bold;
  margin: 5px 0;
}

.ouvintes {
  margin-top: 10px;
  font-size: 14px;
}

/* BOTÃO */
.play-btn {
  width: 60px;
  height: 60px;
  margin-top: 20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.4s;
}

.play-btn:hover {
  transform: scale(1.1);
  background: rgba(255,255,255,0.2);
}

.icon {
  width: 0;
  height: 0;
  border-left: 14px solid #fff;
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
  transition: 0.3s;
}

.playing .icon {
  width: 14px;
  height: 18px;
  border: none;
  position: relative;
}

.playing .icon::before,
.playing .icon::after {
  content: "";
  position: absolute;
  width: 4px;
  height: 100%;
  background: #fff;
  border-radius: 2px;
}

.playing .icon::before { left: 0; }
.playing .icon::after { right: 0; }

</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="player">

  <div class="capa" id="capa"></div>

  <div class="content">
    <div class="radio" id="radio">Carregando...</div>

    <div class="artista" id="artista">Artista...</div>
    <div class="musica" id="musica">Música...</div>

    <div class="ouvintes" id="ouvintes">👥 0 ouvintes</div>

    <div class="play-btn" onclick="togglePlay()" id="btn">
      <div class="icon"></div>
    </div>
  </div>

</div>

<!-- 🔥 STREAM HTTPS -->
<audio id="audio" src="https://stm.igng.com.br:7018/stream"></audio>

<script>

let audio = document.getElementById("audio");
let btn = document.getElementById("btn");
let playing = false;

function togglePlay() {
  if (playing) {
    audio.pause();
    btn.classList.remove("playing");
    playing = false;
  } else {
    audio.play();
    btn.classList.add("playing");
    playing = true;
  }
}

// separar artista
function separarMusica(texto) {
  let partes = texto.split(" - ");
  return {
    artista: partes[0] || "Desconhecido",
    musica: partes[1] || texto
  };
}

// API HTTPS
function carregarDados() {
  $.getJSON(
    "https://api.allorigins.win/raw?url=https://igng.com.br/api-json/VG5wQmVFOUJQVDA9KzM=",
    function(data) {

      let info = separarMusica(data.musica_atual);

      $("#radio").text(data.titulo);
      $("#artista").text(info.artista);
      $("#musica").text(info.musica);
      $("#ouvintes").text("👥 " + data.ouvintes_conectados + " ouvintes");

      if (data.capa_musica) {
        $("#capa").css("background-image", "url(" + data.capa_musica + ")");
        $("#bg").css("background-image", "url(" + data.capa_musica + ")");
      }

    }
  );
}

setInterval(carregarDados, 10000);
carregarDados();

</script>

</body>
</html>
