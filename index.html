<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Player PRO ULTRA</title>

<!-- CSS -->
<style>
@charset "utf-8";

/* GOOGLE FONT */
@import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@1,300;1,800&display=swap');

/* RESET */
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: 'Poppins', sans-serif;
}

/* FUNDO */
#bgCover {
    position: fixed;
    width: 100%;
    height: 100%;
    background-size: cover;
    filter: blur(25px);
    opacity: 0.4;
    z-index: -1;
}

/* PLAYER */
.player-box {
    max-width: 400px;
    margin: 50px auto;
    padding: 20px;
    border-radius: 20px;
    background: rgba(0,0,0,0.7);
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
}

/* CAPA */
#currentCoverArt {
    width: 100%;
    height: 300px;
    border-radius: 15px;
    background-size: cover;
    background-position: center;
}

/* TEXTOS */
.current-song {
    font-size: 26px;
    font-weight: 800;
    text-transform: uppercase;
    overflow: hidden;
}

.current-artist {
    font-size: 18px;
    opacity: 0.8;
    overflow: hidden;
}

/* BOTÃO */
#playerButton {
    font-size: 70px;
    cursor: pointer;
    margin-top: 15px;
}

/* VOLUME */
.volume-control {
    margin-top: 20px;
}

input[type=range] {
    width: 100%;
}

/* ========================= */
/* 👉 SEU CSS ORIGINAL AQUI */
/* ========================= */

/* (mantive partes importantes e compatíveis) */

.play-pause i {
    cursor: pointer;
    color: white; 
}

input[type=range]::-webkit-slider-thumb {
    height: 20px;
    width: 20px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
}

.fade-in {
    opacity: 1;
    transition: 0.5s;
}

.fade-out {
    opacity: 0;
    transition: 0.5s;
}
</style>

<!-- ICONES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div id="bgCover"></div>

<div class="player-box text-center">

    <div id="currentCoverArt"></div>

    <h2 id="currentSong" class="current-song mt-3">Carregando...</h2>
    <h4 id="currentArtist" class="current-artist">...</h4>

    <i id="playerButton" class="fa fa-play-circle"></i>

    <div class="volume-control">
        <input type="range" id="volume" min="0" max="100" value="80">
        <p>Volume: <span id="volIndicator">80</span>%</p>
    </div>

</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery.marquee@1.6.0/jquery.marquee.min.js"></script>

<script>
// CONFIG
const streamURL = "https://stm.igng.com.br:7018";
const apiURL = "http://igng.com.br/api/VG5wQmVFOUJQVDA9KzM=";

let audio = new Audio(streamURL);
audio.volume = 0.8;

// CLICK PLAY
document.getElementById("playerButton").addEventListener("click", togglePlay);

function togglePlay() {
    let btn = document.getElementById("playerButton");

    if (audio.paused) {
        audio.play().then(() => {
            btn.classList.replace("fa-play-circle","fa-pause-circle");
        });
    } else {
        audio.pause();
        btn.classList.replace("fa-pause-circle","fa-play-circle");
    }
}

// VOLUME
volume.oninput = () => {
    audio.volume = volume.value / 100;
    volIndicator.innerText = volume.value;
};

// API
function getData() {
    fetch(apiURL)
    .then(res => res.json())
    .then(data => {

        let song = data.currentSong || "Sem música";
        let artist = data.currentArtist || "Sem artista";

        if (song.includes("-")) {
            let parts = song.split("-");
            artist = parts[0].trim();
            song = parts[1].trim();
        }

        $("#currentSong").text(song).marquee({duration:8000});
        $("#currentArtist").text(artist).marquee({duration:10000});

        buscarCapa(artist, song);
    });
}

// CAPA
function buscarCapa(artist, song) {
    let query = encodeURIComponent(artist + " " + song);

    fetch(`https://itunes.apple.com/search?term=${query}&limit=1`)
    .then(res => res.json())
    .then(data => {

        let cover = "https://via.placeholder.com/500x500";

        if (data.results.length > 0) {
            cover = data.results[0].artworkUrl100.replace("100x100","500x500");
        }

        document.getElementById("currentCoverArt").style.backgroundImage = `url(${cover})`;
        document.getElementById("bgCover").style.backgroundImage = `url(${cover})`;
    });
}

// LOOP API
setInterval(getData, 10000);
getData();
</script>

</body>
</html>
