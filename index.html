<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Rádio ULTRA</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial;
  background: #000;
  overflow: hidden;
}

/* FUNDO BLUR */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  filter: blur(40px) brightness(0.4);
  transform: scale(1.2);
  background-size: cover;
  z-index: -1;
  transition: 0.8s;
}

/* PLAYER */
.player {
  width: 767px;
  height: 410px;
  display: flex;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
}

/* CAPA */
.capa {
  width: 198px;
  height: 216px;
  margin: 20px;
  border-radius: 12px;
  background: #222;
  background-size: cover;
  background-position: center;
  transition: 0.5s;
}

/* CONTEÚDO */
.content {
  padding: 20px;
  flex: 1;
}

.radio { opacity: 0.8; }

/* AO VIVO */
.live {
  display: inline-block;
  margin-top: 10px;
  padding: 5px 10px;
  background: red;
  border-radius: 20px;
  font-size: 12px;
  font-weight: bold;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.5; }
}

/* ARTISTA */
.artista {
  margin-top: 10px;
  font-size: 18px;
}

/* MUSICA COM ROLAGEM */
.musica {
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
  font-size: 24px;
  font-weight: bold;
}

.musica span {
  display: inline-block;
}

/* animação */
.rolando {
  animation: rolarTexto 10s linear infinite;
}

@keyframes rolarTexto {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

/* OUVINTES */
.ouvintes {
  margin-top: 10px;
}

/* BOTÃO */
.play-btn {
  width: 60px;
  height: 60px;
  margin-top: 20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.icon {
  width: 0;
  height: 0;
  border-left: 14px solid #fff;
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
}

.playing .icon {
  width: 14px;
  height: 18px;
  border: none;
  position: relative;
}

.playing .icon::before,
.playing .icon::after {
  content: "";
  position: absolute;
  width: 4px;
  height: 100%;
  background: #fff;
}

.playing .icon::before { left: 0; }
.playing .icon::after { right: 0; }

</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="player">

  <div class="capa" id="capa"></div>

  <div class="content">
    <div class="radio" id="radio">Carregando...</div>

    <div id="liveStatus"></div>

    <div class="artista" id="artista">---</div>

    <div class="musica">
      <span id="musicaTexto">---</span>
    </div>

    <div class="ouvintes" id="ouvintes">👥 0</div>

    <div class="play-btn" onclick="togglePlay()" id="btn">
      <div class="icon"></div>
    </div>
  </div>

</div>

<audio id="audio" src="https://stm.igng.com.br:7018/stream"></audio>

<script>

let audio = document.getElementById("audio");
let btn = document.getElementById("btn");
let ultimaMusica = "";

// botão
audio.onplay = () => btn.classList.add("playing");
audio.onpause = () => btn.classList.remove("playing");

function togglePlay() {
  audio.paused ? audio.play() : audio.pause();
}

// separar artista
function separarMusica(texto) {
  if (!texto) return { artista: "Desconhecido", musica: "Sem dados" };

  let partes = texto.split(" - ");
  if (partes.length >= 2) {
    return { artista: partes[0], musica: partes.slice(1).join(" - ") };
  }

  return { artista: "AO VIVO", musica: texto };
}

// animação música
function atualizarTextoMusica(texto) {
  const el = document.getElementById("musicaTexto");

  el.classList.remove("rolando");
  el.innerText = texto;

  setTimeout(() => {
    if (el.scrollWidth > el.parentElement.clientWidth) {
      el.classList.add("rolando");
    }
  }, 300);
}

// APIs
const API_JSON = "https://api.codetabs.com/v1/proxy?quest=https://igng.com.br/api-json/VG5wQmVFOUJQVDA9KzM=";
const API_XML  = "https://api.codetabs.com/v1/proxy?quest=https://igng.com.br/api/NzAxOCsx";

// JSON
function carregarJSON() {
  fetch(API_JSON)
    .then(r => r.json())
    .then(data => {
      if (!data || !data.musica_atual) throw "erro";
      processar(data);
    })
    .catch(() => carregarXML());
}

// XML fallback
function carregarXML() {
  fetch(API_XML)
    .then(r => r.text())
    .then(str => {
      let xml = new DOMParser().parseFromString(str, "text/xml");

      let data = {
        titulo: xml.getElementsByTagName("titulo")[0]?.textContent,
        musica_atual: xml.getElementsByTagName("musica_atual")[0]?.textContent,
        ouvintes_conectados: xml.getElementsByTagName("ouvintes_conectados")[0]?.textContent,
        capa_musica: xml.getElementsByTagName("capa_musica")[0]?.textContent
      };

      processar(data);
    });
}

// PROCESSAMENTO
function processar(data) {

  if (!data.musica_atual) return;
  if (data.musica_atual === ultimaMusica) return;

  ultimaMusica = data.musica_atual;

  let info = separarMusica(data.musica_atual);

  document.getElementById("radio").innerText = data.titulo || "Rádio";
  document.getElementById("artista").innerText = info.artista;
  atualizarTextoMusica(info.musica);
  document.getElementById("ouvintes").innerText = " " + (data.ouvintes_conectados || 0);

  // AO VIVO
  let live = document.getElementById("liveStatus");

  if (!data.musica_atual.includes(" - ")) {
    live.innerHTML = '<div class="live">● AO VIVO</div>';
  } else {
    live.innerHTML = '';
  }

  // capa + fundo
  if (data.capa_musica && data.capa_musica.includes("http")) {
    document.getElementById("capa").style.backgroundImage = `url(${data.capa_musica})`;
    document.getElementById("bg").style.backgroundImage = `url(${data.capa_musica})`;
  }
}

// tempo real
setInterval(carregarJSON, 3000);
carregarJSON();

</script>

</body>
</html>
