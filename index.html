<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Rádio ULTRA MASTER</title>

<!-- Ícones -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial;
  background: #000;
  overflow: hidden;
}

/* FUNDO */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  filter: blur(40px) brightness(0.4);
  transform: scale(1.2);
  background-size: cover;
}

/* PLAYER */
.player {
  width: 767px;
  height: 410px;
  display: flex;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
}

/* CAPA */
.capa {
  width: 198px;
  height: 216px;
  margin: 20px;
  border-radius: 12px;
  background-size: cover;
  background-position: center;
}

/* CONTEÚDO */
.content {
  padding: 20px;
  flex: 1;
}

/* RELÓGIO */
.relogio {
  font-size: 14px;
  opacity: 0.8;
}

/* AO VIVO */
.live {
  margin-top: 10px;
  padding: 5px 10px;
  background: red;
  border-radius: 20px;
  font-size: 12px;
  animation: blink 1s infinite;
}
@keyframes blink { 50% { opacity: 0.5; } }

/* ARTISTA */
.artista { margin-top: 10px; }

/* 🎵 MUSICA 493px FIXO */
.musica {
  width: 493px;
  max-width: 493px;
  overflow: hidden;
  position: relative;
  font-size: 24px;
  font-weight: bold;
}

.musica span {
  white-space: nowrap;
  display: inline-block;
  padding-right: 50px;
}

/* fade */
.musica::before,
.musica::after {
  content: "";
  position: absolute;
  top: 0;
  width: 30px;
  height: 100%;
}

.musica::before {
  left: 0;
  background: linear-gradient(to right, #000, transparent);
}

.musica::after {
  right: 0;
  background: linear-gradient(to left, #000, transparent);
}

/* animação */
.rolando {
  animation: rolarTexto linear infinite alternate;
}

@keyframes rolarTexto {
  from { transform: translateX(0); }
  to   { transform: translateX(calc(-100% + 493px)); }
}

/* OUVINTES */
.ouvintes { margin-top: 10px; }

/* BOTÃO PLAY */
.play-btn {
  width: 60px;
  height: 60px;
  margin-top: 15px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.3s;
}

.play-btn:hover {
  transform: scale(1.1);
}

/* ÍCONE PLAY/PAUSE */
.icon {
  width: 0;
  height: 0;
  border-left: 14px solid #fff;
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
}

.playing .icon {
  width: 14px;
  height: 18px;
  border: none;
  position: relative;
}

.playing .icon::before,
.playing .icon::after {
  content: "";
  position: absolute;
  width: 4px;
  height: 100%;
  background: #fff;
}

.playing .icon::before { left: 0; }
.playing .icon::after { right: 0; }

/* REDES */
.redes {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

.redes a {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  text-decoration: none;
  transition: 0.3s;
}

.redes a:hover {
  background: rgba(255,255,255,0.3);
  transform: scale(1.1);
}

/* PARTÍCULAS */
.particle {
  position: fixed;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
  width: 5px;
  height: 5px;
  pointer-events: none;
  animation: subir 1s forwards;
}

@keyframes subir {
  to { transform: translateY(-40px); opacity: 0; }
}

</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="player">

  <div class="capa" id="capa"></div>

  <div class="content">
    <div id="radio">Carregando...</div>

    <div class="relogio">
      <span id="hora"></span> • <span id="data"></span>
    </div>

    <div id="liveStatus"></div>

    <div class="artista" id="artista"></div>

    <div class="musica">
      <span id="musicaTexto"></span>
    </div>

    <div class="ouvintes" id="ouvintes"></div>

    <div class="play-btn" onclick="togglePlay()" id="btn">
      <div class="icon"></div>
    </div>

    <!-- REDES SOCIAIS -->
    <div class="redes">
      <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://seusite.com" target="_blank"><i class="fas fa-globe"></i></a>
    </div>

  </div>

</div>

<audio id="audio" src="https://stm.igng.com.br:7018/stream"></audio>

<script>

let audio = document.getElementById("audio");
let btn = document.getElementById("btn");
let ultima = "";
let ultimoTempo = 0;

// botão
audio.onplay = () => btn.classList.add("playing");
audio.onpause = () => btn.classList.remove("playing");

function togglePlay(){
  audio.paused ? audio.play() : audio.pause();
}

// relógio
setInterval(()=>{
  let d = new Date();
  hora.innerText = d.toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo'});
  data.innerText = d.toLocaleDateString('pt-BR',{timeZone:'America/Sao_Paulo'});
},1000);

// separar música
function separar(t){
  let p = t.split(" - ");
  return p.length>=2 ? {a:p[0],m:p.slice(1).join(" - ")} : {a:"AO VIVO",m:t};
}

// música com limite 493
function setMusica(txt){
  let el = musicaTexto;
  el.classList.remove("rolando");
  el.style.animation="";
  el.innerText = txt;

  setTimeout(()=>{
    if(el.scrollWidth>493){
      let dist = el.scrollWidth-493;
      el.style.animation=`rolarTexto ${dist/30}s linear infinite alternate`;
      el.classList.add("rolando");
    }
  },200);
}

// API
function carregar(){
fetch("https://api.codetabs.com/v1/proxy?quest=https://igng.com.br/api-json/VG5wQmVFOUJQVDA9KzM=")
.then(r=>r.json())
.then(d=>{
if(!d.musica_atual || d.musica_atual==ultima)return;

ultima=d.musica_atual;

let info=separar(d.musica_atual);

radio.innerText=d.titulo;
artista.innerText=info.a;
setMusica(info.m);
ouvintes.innerText="👥 "+d.ouvintes_conectados;

liveStatus.innerHTML=d.musica_atual.includes(" - ")?"":"<div class='live'>● AO VIVO</div>";

if(d.capa_musica){
capa.style.backgroundImage=`url(${d.capa_musica})`;
bg.style.backgroundImage=`url(${d.capa_musica})`;
}
});
}

setInterval(carregar,3000);
carregar();

// partículas
document.addEventListener("mousemove",e=>{
let agora=Date.now();
if(agora-ultimoTempo<40)return;
ultimoTempo=agora;

let p=document.createElement("div");
p.className="particle";
p.style.left=e.clientX+"px";
p.style.top=e.clientY+"px";
document.body.appendChild(p);
setTimeout(()=>p.remove(),1000);
});

</script>

</body>
</html>
