<div class="radio-player">
  <div class="header">
    <h2 id="radio-name"></h2>
    <p>Ouvintes: <span id="listeners"></span></p>
    <p>Bitrate: <span id="bitrate"></span></p>
  </div>

  <div class="content">
    <img id="album-cover" alt="Capa do Álbum" class="album-cover">
    <div class="track-info">
      <p><strong>Música atual:</strong> <span id="song"></span></p>
      <p><strong>Gênero:</strong> <span id="genre"></span></p>
    </div>
  </div>

  <div class="player-audio">
    <audio id="radio-stream" controls autoplay>
      <source src="https://stm.igng.com.br:7018/stream" type="audio/mpeg">
    </audio>
  </div>
</div>
